services:
  abt:
    build:
      context: .
      dockerfile: .docker/abt/Dockerfile
    image: abt:latest
    container_name: abt
    restart: unless-stopped
    depends_on:
      - graphiti
    environment:
      # The container is itself the sandbox. claude-code (>=2.1.x) refuses
      # --dangerously-skip-permissions when running as root unless IS_SANDBOX=1
      # is set, which the agent uses whenever agent_dangerously_skip_permissions
      # is on. Without this every fresh session spawn exits 1.
      - IS_SANDBOX=1
      # Moscow time (UTC+3, no DST) so log timestamps match the host.
      - TZ=Europe/Moscow
    volumes:
      # Live project code from the host, read-only. The editable install adds
      # /app to sys.path, so /app/src is imported straight from the host —
      # edits reflect on `docker compose restart`, no rebuild. Rebuild is only
      # needed when dependencies (pyproject.toml) change.
      - ./src:/app/src:ro
      - ./.agents:/app/.agents:ro

      # Container config (paths point at the mounts below). Nested under ./src
      # above, so this more-specific mount still overrides config.yaml.
      - ./src/config/config.docker.yaml:/app/src/config/config.yaml:ro

      # Live Obsidian vault = agent working dir. Read-write: the bot edits notes
      # and writes skill symlinks under /vault/.claude/skills.
      - /Users/eugene/Documents/Obsidian/Brain:/vault

      # Agent credentials + per-session history from the host.
      # ~/.claude also holds the SDK session store (keyed by cwd=/vault).
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.pi:/root/.pi

      # Persistent bot state (logs, message DBs, tasks, commands, uploads).
      - ./var:/app/var
    healthcheck:
      # Scheduler liveness: exits 1 (unhealthy) when the heartbeat the scheduler
      # rewrites each tick is missing or older than 120s.
      test: ['CMD', 'python', '-m', 'src.infra.healthcheck']
      interval: 30s
      timeout: 5s
      retries: 3
      # First heartbeat lands within one tick (60s); don't fail before then.
      start_period: 90s
    labels:
      # The autoheal sidecar restarts containers it finds unhealthy — compose's
      # `restart` policy reacts to exit, not to health status.
      - autoheal=true

  # Restarts any container labelled `autoheal=true` once Docker marks it
  # unhealthy. Needs the Docker socket; drop this service if you prefer to act
  # on the unhealthy status manually (it is visible in `docker compose ps`).
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: abt-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=15
      - TZ=Europe/Moscow
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Temporal knowledge-graph memory. The bot's Claude agent reaches it as an
  # MCP server over HTTP (see /vault/.mcp.json -> http://graphiti:8000/mcp/).
  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: graphiti
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-demodemo}
      - NEO4J_DATABASE=neo4j
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-gpt-4.1-mini}
      - GRAPHITI_GROUP_ID=${GRAPHITI_GROUP_ID:-main}
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-10}
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - TZ=Europe/Moscow
    volumes:
      - ./.docker/graphiti-config.yaml:/app/mcp/config/config.yaml:ro
    # No host port: the bot reaches the MCP server over the compose network at
    # graphiti:8000. Add `ports: ["8000:8000"]` only to hit it from the host.
    command: ['uv', 'run', 'main.py']

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-demodemo}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - TZ=Europe/Moscow
    ports:
      - '7474:7474' # Neo4j browser UI
      - '7687:7687' # Bolt
    volumes:
      - ./var/neo4j/data:/data
      - ./var/neo4j/logs:/logs
    healthcheck:
      test: ['CMD', 'wget', '-O', '/dev/null', 'http://localhost:7474']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
